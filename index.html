<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ProfeYa</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-color: #f5f7ff;
}

header {
  background-color: #4b63ff;
  color: white;
  padding: 20px 50px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
}

.hero {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 60px;
}

.hero-texto {
  width: 50%;
}

.hero-texto h1 {
  font-size: 50px;
  color: #4b63ff;
}

.hero-texto p {
  font-size: 20px;
  margin-bottom: 30px;
}

.hero-texto button {
  background-color: #4b63ff;
  color: white;
  border: none;
  padding: 15px 25px;
  border-radius: 10px;
  cursor: pointer;
  margin-right: 10px;
}

.hero img {
  width: 40%;
  border-radius: 20px;
}

footer {
  background-color: #4b63ff;
  color: white;
  text-align: center;
  padding: 20px;
}

.carrusel {

  width: 40%;

}

.carrusel img {

  width: 100%;
  height: 400px;
  object-fit: cover;
  border-radius: 20px;
  transition: 1s;

}

</style>

</head>

<body>

<header>

<h2>📚 ProfeYa</h2>

<nav>
  <a href="login-profesores.html">Iniciar Sesión</a>
  <a href="registro-profesores.html">Registrarse</a>
</nav>

</header>

<section class="hero">

<div class="hero-texto">

<h1>Encontrá profesores particulares fácilmente</h1>

<p>
Clases virtuales y presenciales para todas las materias.
</p>

<a href="buscar-profesores.html"> 
<button> 
Buscar Profesores 
</button>
</a> 


<button>Publicar Perfil</button>

  <div class="carrusel">

    <img
    id="imagen-carrusel"
    src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f"
    alt="Carrusel ProfeYa">

  </div>
  

</section>

<footer>

<p>© 2026 ProfeYa - Marketplace educativo</p>

</footer>
<script>

  const imagenes = [

  'https://images.unsplash.com/photo-1522202176988-66273c2fd55f',

  'https://images.unsplash.com/photo-1516321318423-f06f85e504b3',

  'https://images.unsplash.com/photo-1509062522246-3755977927d7'

  ];

  let posicion = 0;

  function cambiarImagen() {

    posicion++;

    if(posicion >= imagenes.length) {

      posicion = 0;

    }

    document.getElementById('imagen-carrusel').src =
    imagenes[posicion];

  }

  setInterval(cambiarImagen, 3000);

</script>

</body>

</html>
