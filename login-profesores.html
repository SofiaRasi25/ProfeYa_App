<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Profesores</title>

<style>

body {
  margin: 0;
  font-family: Arial;
  background-color: #f5f7ff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.login-container {

  background-color: white;
  width: 400px;
  padding: 40px;
  border-radius: 20px;
  text-align: center;

}

h1 {
  color: #4b63ff;
}

input {

  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
  border: 1px solid #ccc;

}

button {

  width: 100%;
  padding: 14px;
  margin-top: 25px;
  border: none;
  border-radius: 10px;
  background-color: #4b63ff;
  color: white;
  cursor: pointer;

}

a {

  display: block;
  margin-top: 20px;
  text-decoration: none;
  color: #666;

}

</style>

</head>

<body>

<div class="login-container">

<h1>📚 ProfeYa</h1>

<p>Ingresá como profesor para administrar tus clases.</p>

<form>

<input type="email" placeholder="Correo electrónico">

<input type="password" placeholder="Contraseña">

<button type="button" onclick="iniciarSesion()">
Iniciar Sesión
</button>

</form>

<a href="index.html">Volver al inicio</a>

</div>

<script>

function iniciarSesion() {

 alert('Inicio de sesión exitoso 📚');

}

</script>

</body>

</html>
